    var nodes = new vis.DataSet(rawNodes);
    var edges = new vis.DataSet(rawEdges);

    var container = document.getElementById('mynetwork');
    var data = { nodes: nodes, edges: edges };
    var options = {
      interaction: {
        hover: true,
        tooltipDelay: 100,
        selectConnectedEdges: true
      },
      layout: {
        hierarchical: {
          enabled: true,
          direction: 'LR',        // Left to Right! Lebih natural seperti pipeline
          sortMethod: 'directed',
          nodeSpacing: 100,
          levelSeparation: 300
        }
      },
      physics: {
        hierarchicalRepulsion: {
          nodeDistance: 150
        }
      }
    };
    var network = new vis.Network(container, data, options);

    // Fitur: Highlight Relasi Saat di Klik (Fokus Mode)
    network.on("selectNode", function (params) {
      if (params.nodes.length == 1) {
        var selectedNodeId = params.nodes[0];
        var connectedNodes = network.getConnectedNodes(selectedNodeId);
        
        // Redupkan semua node yang tidak nyambung
        var updateNodes = rawNodes.map(function(n) {
          if (n.id === selectedNodeId || connectedNodes.includes(n.id)) {
            return { id: n.id, opacity: 1 };
          }
          return { id: n.id, opacity: 0.15 };
        });
        nodes.update(updateNodes);
      }
    });

    // Fitur: Kembalikan warna saat klik dilepas
    network.on("deselectNode", function () {
      var updateNodes = rawNodes.map(function(n) {
        return { id: n.id, opacity: 1 };
      });
      nodes.update(updateNodes);
    });
